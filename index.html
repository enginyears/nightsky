<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galaxy</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:crosshair;font-family:serif}
canvas{position:fixed;top:0;left:0}

/* HUD */
#hud{
position:fixed;bottom:0;left:50%;transform:translateX(-50%);
color:white;text-align:center;opacity:0;transition:1s;
}
#hud.on{opacity:1}
.hud-num{font-size:48px}

/* Loader */
#loader{
position:fixed;inset:0;background:#000;
display:flex;align-items:center;justify-content:center;
color:white;font-size:14px;
}
</style>

</head>

<body>

<div id="loader">Loading your galaxy…</div>
<canvas id="c"></canvas>

<div id="hud">
<div>Stars in your galaxy</div>
<div class="hud-num" id="numEl">0</div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize',()=>{resize();initStars(followerCount)});

// ─────────────────────────
// Cursor Physics
// ─────────────────────────
let mouse={x:W/2,y:H/2};
let cursor={x:W/2,y:H/2,vx:0,vy:0};

document.addEventListener('mousemove',e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

function updateCursor(){
  const dx=mouse.x-cursor.x;
  const dy=mouse.y-cursor.y;

  cursor.vx+=dx*0.08;
  cursor.vy+=dy*0.08;

  cursor.vx*=0.75;
  cursor.vy*=0.75;

  cursor.x+=cursor.vx;
  cursor.y+=cursor.vy;
}

// ─────────────────────────
// Stars (followers)
// ─────────────────────────
let stars=[];
let followerCount= parseInt(localStorage.getItem('ig_count')||'120');

function initStars(count){
  stars=[];
  for(let i=0;i<count;i++){
    const x=Math.random()*W;
    const y=Math.random()*H;

    stars.push({
      x,y,
      ox:x,
      oy:y,
      vx:0,
      vy:0,
      size:Math.random()*1.6+0.4,
      depth:Math.random(),
      tw:Math.random()*Math.PI*2
    });
  }
}

// ─────────────────────────
// Moon
// ─────────────────────────
function drawMoon(){
  const x=W*0.35;
  const y=H*0.35;
  const r=Math.min(W,H)*0.12;

  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,'#fff');
  g.addColorStop(1,'#aaa');

  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
}

// ─────────────────────────
// Loop
// ─────────────────────────
function loop(t){
  requestAnimationFrame(loop);
  updateCursor();

  ctx.clearRect(0,0,W,H);

  // background
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.hypot(W,H));
  bg.addColorStop(0,'#081020');
  bg.addColorStop(1,'#000');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // cursor glow
  const cg=ctx.createRadialGradient(cursor.x,cursor.y,0,cursor.x,cursor.y,120);
  cg.addColorStop(0,'rgba(120,180,255,0.15)');
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.arc(cursor.x,cursor.y,120,0,Math.PI*2);
  ctx.fill();

  // stars physics
  stars.forEach(s=>{
    const dx=cursor.x-s.x;
    const dy=cursor.y-s.y;
    const dist=Math.hypot(dx,dy);

    const force=Math.min(120/(dist+20),2);

    s.vx+=dx*0.0008*force;
    s.vy+=dy*0.0008*force;

    if(dist<60){
      s.vx-=dx*0.01;
      s.vy-=dy*0.01;
    }

    // return to origin
    s.vx+=(s.ox-s.x)*0.002;
    s.vy+=(s.oy-s.y)*0.002;

    s.vx*=0.96;
    s.vy*=0.96;

    s.x+=s.vx;
    s.y+=s.vy;

    const tw=(Math.sin(t*0.002+s.tw)*0.5+0.5);

    const px=s.x+(cursor.x-W/2)*s.depth*0.05;
    const py=s.y+(cursor.y-H/2)*s.depth*0.05;

    ctx.globalAlpha=0.6+tw*0.6;
    ctx.beginPath();
    ctx.arc(px,py,s.size*(0.8+tw*0.3),0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.fill();
  });

  ctx.globalAlpha=1;

  drawMoon();
}

// ─────────────────────────
// Init
// ─────────────────────────
initStars(followerCount);
loop(0);

document.getElementById('numEl').textContent=followerCount.toLocaleString();
document.getElementById('hud').classList.add('on');
document.getElementById('loader').style.display='none';

</script>

</body>
</html>
