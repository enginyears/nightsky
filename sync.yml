name: 🌌 Sync Galaxy

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  # Manual trigger (useful for first run / debugging)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install instaloader

      - name: Fetch follower count
        # Script exits 1 on hard failure, but we don't want the whole
        # workflow to error — just skip the commit step instead.
        id: fetch
        run: python fetch.py && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet \
            && echo "No change in data — nothing to commit." \
            || git commit -m "data: sync $(date -u +'%Y-%m-%d %H:%M UTC')" && git push
